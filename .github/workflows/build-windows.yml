name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller customtkinter playwright

      - name: Install Chromium for Playwright
        run: playwright install chromium

      - name: Build EXE
        run: pyinstaller museum_booker.spec

      - name: Copy browsers alongside EXE
        shell: pwsh
        run: |
          $browsersRoot = "$env:LOCALAPPDATA\ms-playwright"
          $chromiumDir = Get-ChildItem -Path $browsersRoot -Directory -Filter "chromium-*" | Select-Object -First 1
          if ($chromiumDir) {
            Copy-Item -Path $chromiumDir.FullName -Destination "dist\browsers\$($chromiumDir.Name)" -Recurse
            Write-Host "Copied $($chromiumDir.FullName) to dist\browsers\$($chromiumDir.Name)"
          } else {
            Write-Host "ERROR: No chromium directory found in $browsersRoot"
            exit 1
          }

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MuseumBooker-Windows
          path: dist/
          retention-days: 30
