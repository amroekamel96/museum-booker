name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller customtkinter playwright

      - name: Build EXE
        run: pyinstaller museum_booker.spec

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MuseumBooker-Windows
          path: dist/MuseumBooker.exe
          retention-days: 30
